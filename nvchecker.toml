[__config__]
oldver = "old.json"
newver = "new.json"

[c]
source = "github"
github = "ryanmjacobs/c"
use_max_tag = true
prefix = "v"

[include-what-you-use]
source = "cmd"
cmd = "scripts/check-iwyu.sh"

[easy-conflict]
source = "github"
github = "chojs23/ec"
use_max_tag = true
prefix = "v"

[easy-conflict-bin]
source = "github"
github = "chojs23/ec"
use_max_tag = true
prefix = "v"

[git-add-interactive]
source = "github"
github = "cwarden/git-add--interactive"
use_max_tag = true
prefix = "v"

[lavacli]
source = "gitlab"
gitlab = "lava/lavacli"
host = "gitlab.com"
use_max_tag = true
prefix = "v"

[pkgtrack]
source = "github"
github = "jetm/pkgtrack"
use_max_tag = true
prefix = "v"
